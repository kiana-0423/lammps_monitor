repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        args: [src/hotspot_al]
        additional_dependencies:
          - numpy>=1.24
          - scipy>=1.10
          - ase>=3.22
          - pyyaml>=6.0
          - types-PyYAML>=6.0
